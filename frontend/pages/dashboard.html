<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel | Escola</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="app-body">
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-inner">
        <div id="sidebar-brand" class="flex items-center gap-3 shrink-0"></div>
        <nav id="nav" class="sidebar-nav"></nav>
        <button id="logout-btn" class="btn-ghost w-full shrink-0">Sair</button>
      </div>
    </aside>

    <div class="app-main">
      <header class="app-header">
        <div class="flex items-center gap-3 min-w-0">
          <button id="menu-btn" class="btn-ghost lg:hidden" type="button" aria-label="Abrir menu">Menu</button>
          <div id="header-brand" class="min-w-0"></div>
        </div>
        <div class="text-right shrink-0">
          <p id="page-title" class="font-semibold text-sm md:text-base"></p>
          <p id="page-subtitle" class="text-xs text-[rgba(11,31,42,0.6)]"></p>
          <p id="user-name" class="font-semibold text-sm mt-1"></p>
          <p id="user-role" class="text-xs uppercase tracking-wide text-[var(--sea)]"></p>
        </div>
      </header>

      <main id="content" class="app-content"></main>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/branding.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
