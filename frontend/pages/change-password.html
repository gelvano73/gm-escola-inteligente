<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alterar senha | G&M Escola Inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="panel w-full max-w-md p-7 slide-up">
    <div class="flex items-center justify-between gap-3 mb-4">
      <div class="brand-mark">G&M</div>
      <button type="button" id="btn-voltar" class="btn-ghost inline-flex items-center gap-1.5 text-sm">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        Voltar
      </button>
    </div>
    <h1 class="font-display text-3xl">Alterar senha</h1>
    <p class="mt-2 text-[rgba(11,31,42,0.65)]">
      No primeiro acesso é obrigatório definir uma nova senha antes de continuar.
    </p>

    <form id="form-senha" class="space-y-4 mt-6">
      <div>
        <label class="block text-sm font-semibold mb-1.5" for="senha_atual">Senha atual</label>
        <div class="password-field">
          <input class="input-field" id="senha_atual" name="senha_atual" type="password" required autocomplete="current-password" />
          <button type="button" class="password-toggle" data-target="senha_atual" aria-label="Mostrar senha atual">
            <svg class="icon-eye" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon-eye-off hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5" for="nova_senha">Nova senha</label>
        <div class="password-field">
          <input class="input-field" id="nova_senha" name="nova_senha" type="password" minlength="6" required autocomplete="new-password" />
          <button type="button" class="password-toggle" data-target="nova_senha" aria-label="Mostrar nova senha">
            <svg class="icon-eye" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon-eye-off hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5" for="confirmar_senha">Confirmar nova senha</label>
        <div class="password-field">
          <input class="input-field" id="confirmar_senha" name="confirmar_senha" type="password" minlength="6" required autocomplete="new-password" />
          <button type="button" class="password-toggle" data-target="confirmar_senha" aria-label="Mostrar confirmação de senha">
            <svg class="icon-eye" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon-eye-off hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
          </button>
        </div>
      </div>
      <p id="erro" class="text-sm text-red-700 hidden"></p>
      <button class="btn-primary w-full" type="submit">Salvar nova senha</button>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById("btn-voltar").onclick = () => {
      const me = Auth.getUser();
      if (me?.must_change_password || me?.user?.must_change_password) {
        Auth.logout();
        return;
      }
      window.location.href = me ? Auth.homeFor(me) : "/";
    };

    document.querySelectorAll(".password-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        const input = document.getElementById(btn.dataset.target);
        const showing = input.type === "text";
        input.type = showing ? "password" : "text";
        btn.querySelector(".icon-eye").classList.toggle("hidden", !showing);
        btn.querySelector(".icon-eye-off").classList.toggle("hidden", showing);
        btn.setAttribute("aria-label", showing ? "Mostrar senha" : "Ocultar senha");
      });
    });

    if (!Auth.requireAuth(Auth.loginPathFor(Auth.getUser()?.perfil))) {
      // redirect handled
    } else {
      document.getElementById("form-senha").addEventListener("submit", async (e) => {
        e.preventDefault();
        const erro = document.getElementById("erro");
        erro.classList.add("hidden");
        const senha_atual = document.getElementById("senha_atual").value;
        const nova_senha = document.getElementById("nova_senha").value;
        const confirmar_senha = document.getElementById("confirmar_senha").value;
        try {
          await GMApi.api("/auth/change-password", {
            method: "POST",
            body: { senha_atual, nova_senha, confirmar_senha },
          });
          const me = await GMApi.api("/auth/me");
          Auth.setSession(Auth.getToken(), me);
          window.location.href = Auth.homeFor(me);
        } catch (err) {
          erro.textContent = err.message;
          erro.classList.remove("hidden");
        }
      });
    }
  </script>
</body>
</html>
